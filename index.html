    <!-- Deferred Unicorn Studio Script -->
    <script type="text/javascript">
    window.addEventListener('load', function() {
      setTimeout(function() {
        !function(){
          var u=window.UnicornStudio;
          if(u&&u.init){
            u.init()
          }else{
            window.UnicornStudio={isInitialized:!1};
            var i=document.createElement("script");
            i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.6/dist/unicornStudio.umd.js";
            i.async=true;
            i.onload=function(){
              if(window.UnicornStudio && typeof window.UnicornStudio.init === 'function') {
                window.UnicornStudio.init();
              }
            };
            (document.head||document.body).appendChild(i)
          }
        }();
      }, 3000); // Load after 3 seconds to prioritize main thread
    });
    </script>
